# 🚀 Frontend Docker Build & Push CI/CD Pipeline - SPEED OPTIMIZED
# Builds and pushes Next.js Docker images to GitHub Container Registry

name: 🐳 Docker Build & Push - Frontend

# 🔑 Required Permissions for GHCR
permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'providers/**'
      - 'public/**'
      - 'routes/**'
      - 'schemas/**'
      - 'services/**'
      - 'types/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tailwind.config.*'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.env'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'providers/**'
      - 'public/**'
      - 'routes/**'
      - 'schemas/**'
      - 'services/**'
      - 'types/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tailwind.config.*'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.env'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: frontend

jobs:
  # 🧪 Quality Assurance (Optional - Fast Fail)
  quality-checks:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Quick Validation
        id: changes
        run: |
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "🚀 Skipping heavy quality checks for speed"

      - name: 🏗️ Setup Node.js (Optional)
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Quick Validation Build (Optional)
        if: github.event_name == 'pull_request'
        run: |
          npm ci --production --omit=dev --silent
          npm run build --silent || echo "⚠️ Build issues found but continuing..."
        continue-on-error: true
        env:
          NODE_ENV: production
          CI: true

      - name: 🏗️ Setup Node.js
        if: steps.changes.outputs.should_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        if: steps.changes.outputs.should_build == 'true'
        run: npm ci

      - name: 🔧 TypeScript Check
        if: steps.changes.outputs.should_build == 'true'
        run: npm run type-check:ci
        continue-on-error: true

      - name: 🧹 Lint Check
        if: steps.changes.outputs.should_build == 'true'
        run: npm run lint || echo "⚠️ Linting issues found but continuing..."
        continue-on-error: true

      - name: 🏗️ Build Test
        if: steps.changes.outputs.should_build == 'true'
        run: npm run build
        env:
          NODE_ENV: production
          CI: true
          SKIP_ENV_VALIDATION: true

  # 🐳 Docker Build & Push
  docker-build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    if: always()
    outputs:
      image-digest: ${{ steps.docker.outputs.digest }}
      image-version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Extract Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.sha }}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: 🔑 Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate Image Tags and Labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=Amader Krishok Frontend
            org.opencontainers.image.description=Next.js frontend for Amader Krishok platform
            org.opencontainers.image.vendor=Amader Krishok Team

      - name: 🔍 Debug Image Information
        run: |
          echo "🔍 Repository Owner: ${{ github.repository_owner }}"
          echo "🔍 Repository: ${{ github.repository }}"
          echo "🔍 Actor: ${{ github.actor }}"
          echo "🔍 Image Name: ghcr.io/${{ github.repository_owner }}/frontend"
          echo "🔍 Generated Tags:"
          echo "${{ steps.meta.outputs.tags }}"

      - name: 🌍 Load .env file as workflow envs
        run: |
          if [ -f ../../.env ]; then
            echo "Loading root .env for build..."
            export $(grep -v '^#' ../../.env | xargs)
            for var in $(grep -v '^#' ../../.env | grep '=' | cut -d '=' -f1); do
              echo "$var=${!var}" >> $GITHUB_ENV
            done
          fi
      - name: 🚀 Build and Push Docker Image
        id: docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            OPENWEATHERAPIKEY=${{ secrets.OPENWEATHERAPIKEY }}

      - name: 📊 Build Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🚀 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY  
          echo "- **Digest:** \`${{ steps.docker.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Linux/AMD64 (Single Platform)" >> $GITHUB_STEP_SUMMARY
          echo "- **Cache:** GitHub Actions Cache Enabled" >> $GITHUB_STEP_SUMMARY
          echo "- **Quality Checks:** Optional (Speed Optimized)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time:** Optimized for 2-6 minutes" >> $GITHUB_STEP_SUMMARY
